<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Umesh Pawar | Senior Mobile Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        'primary-dark': '#4f46e5',
                        accent: '#06b6d4',
                        'accent-warm': '#f59e0b',
                        bg: '#0f0f1a',
                        'bg-card': '#16162a',
                        'bg-elevated': '#1e1e3a',
                        'text-primary': '#f1f5f9',

                    },
                    fontFamily: {

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #f1f5f9;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 3px; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.2); }
            50% { box-shadow: 0 0 40px rgba(99,102,241,0.5); }
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        @keyframes photo-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(99,102,241,0.3), 0 0 60px rgba(139,92,246,0.15); }
            50% { box-shadow: 0 0 50px rgba(99,102,241,0.5), 0 0 100px rgba(139,92,246,0.25); }
        }
        @keyframes photo-border {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
        .animate-gradient { background-size: 200% 200%; animation: gradient-shift 8s ease infinite; }
        .animate-shake { animation: shake 0.5s ease-in-out; }
        .animate-photo-glow { animation: photo-glow 4s ease-in-out infinite; }

        .glass {
            background: rgba(22, 22, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .glass-strong {
            background: rgba(22, 22, 42, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gradient-text-warm {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(99,102,241,0.3);
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        .btn-primary:hover::after { transform: translateX(100%); }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary:disabled::after { display: none; }

        .btn-outline {
            background: transparent;
            color: #f1f5f9;
            padding: 14px 32px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.08);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .btn-outline:hover {
            border-color: #6366f1;
            color: #6366f1;
            transform: translateY(-2px);
        }

        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .card-hover::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }
        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(99,102,241,0.15);
            border-color: rgba(99,102,241,0.3);
        }
        .card-hover:hover::before { opacity: 0.05; }

        .skill-bar {
            height: 6px;
            background: #1e1e3a;
            border-radius: 3px;
            overflow: hidden;
        }
        .skill-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4);
            background-size: 200% 100%;
            animation: gradient-shift 3s ease infinite;
            border-radius: 3px;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-link {
            position: relative;
            color: #94a3b8;
            transition: color 0.3s ease;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active { color: #f1f5f9; }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }

        .mobile-menu { animation: scaleIn 0.3s ease-out; }

        .timeline-line {
            position: absolute;
            left: 24px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, #6366f1, #06b6d4);
        }
        @media (min-width: 768px) {
            .timeline-line { left: 50%; transform: translateX(-50%); }
        }

        input, textarea {
            -webkit-appearance: none;
            appearance: none;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #6366f1;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            background: rgba(99,102,241,0.1);
            border-color: rgba(99,102,241,0.3);
            color: #f1f5f9;
            transform: translateY(-2px);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Photo styling */
        .photo-frame {
            position: relative;
            padding: 4px;
            border-radius: 24px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4, #6366f1);
            background-size: 300% 300%;
            animation: photo-border 6s ease infinite;
        }
        .photo-frame img {
            border-radius: 20px;
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
        }

        @media (max-width: 640px) {
            .btn-primary, .btn-outline {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
            h1 { font-size: 2.25rem !important; line-height: 1.2 !important; }
            h2 { font-size: 1.75rem !important; }
            h3 { font-size: 1.25rem !important; }
        }

        html, body {
            max-width: 100vw;
            overflow-x: hidden;
        }
    </style>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Particle Background
        const ParticleBackground = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let particles = [];
                let animId;

                const resize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                resize();
                window.addEventListener('resize', resize);

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 2 + 0.5;
                        this.speedX = (Math.random() - 0.5) * 0.5;
                        this.speedY = (Math.random() - 0.5) * 0.5;
                        this.opacity = Math.random() * 0.5 + 0.1;
                    }
                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;
                        if (this.x > canvas.width) this.x = 0;
                        if (this.x < 0) this.x = canvas.width;
                        if (this.y > canvas.height) this.y = 0;
                        if (this.y < 0) this.y = canvas.height;
                    }
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`;
                        ctx.fill();
                    }
                }

                for (let i = 0; i < 60; i++) particles.push(new Particle());

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => { p.update(); p.draw(); });
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 120) {
                                ctx.beginPath();
                                ctx.strokeStyle = `rgba(99, 102, 241, ${0.08 * (1 - dist / 120)})`;
                                ctx.lineWidth = 0.5;
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.stroke();
                            }
                        }
                    }
                    animId = requestAnimationFrame(animate);
                };
                animate();
                return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
            }, []);

            return <canvas ref={canvasRef} className="fixed top-0 left-0 w-full h-full pointer-events-none" style={{ zIndex: 0 }} />;
        };

        // Scroll Animation Hook
        const useScrollAnimation = () => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => { if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(entry.target); } },
                    { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return [ref, isVisible];
        };

        // Animated Counter
        const AnimatedCounter = ({ end, suffix = '', duration = 2000 }) => {
            const [count, setCount] = useState(0);
            const [ref, isVisible] = useScrollAnimation();
            useEffect(() => {
                if (!isVisible) return;
                let start = 0;
                const increment = end / (duration / 16);
                const timer = setInterval(() => {
                    start += increment;
                    if (start >= end) { setCount(end); clearInterval(timer); }
                    else { setCount(Math.floor(start)); }
                }, 16);
                return () => clearInterval(timer);
            }, [isVisible, end, duration]);
            return <span ref={ref}>{count}{suffix}</span>;
        };

        // Icons
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                menu: <path d="M3 12h18M3 6h18M3 18h18" />,
                close: <path d="M18 6L6 18M6 6l12 12" />,
                chevronDown: <path d="M6 9l6 6 6-6" />,
                check: <path d="M20 6L9 17l-5-5" />,
                mail: <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></>,
                phone: <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z" />,
                mapPin: <><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" /><circle cx="12" cy="10" r="3" /></>,
                play: <polygon points="5 3 19 12 5 21 5 3" />,
                building: <><path d="M3 21h18M5 21V7l8-4 8 4v14M8 21v-4a2 2 0 012-2h4a2 2 0 012 2v4" /></>,
                clipboard: <><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" /><rect x="8" y="2" width="8" height="4" rx="1" ry="1" /></>,
                bot: <><rect x="3" y="11" width="18" height="10" rx="2" /><circle cx="12" cy="5" r="2" /><path d="M12 7v4M8 15h8" /></>,
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />,
                brain: <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />,
                smartphone: <><rect x="5" y="2" width="14" height="20" rx="2" ry="2" /><line x1="12" y1="18" x2="12.01" y2="18" /></>,
                layers: <><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></>,
                download: <><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></>,
                arrowRight: <><path d="M5 12h14" /><path d="M12 5l7 7-7 7" /></>,
                chevronRight: <path d="M9 18l6-6-6-6" />,
                externalLink: <><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></>,
                github: <><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></>,
                linkedin: <><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></>,
                twitter: <><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></>,
                send: <><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
                alertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // Navigation
        const Navigation = () => {
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);
            const [activeSection, setActiveSection] = useState('home');

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 50);
                    const sections = ['home', 'about', 'skills', 'experience', 'projects', 'contact'];
                    for (let i = sections.length - 1; i >= 0; i--) {
                        const el = document.getElementById(sections[i]);
                        if (el) {
                            const rect = el.getBoundingClientRect();
                            if (rect.top <= 150) { setActiveSection(sections[i]); break; }
                        }
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
                setMobileOpen(false);
            };

            const navItems = [
                { id: 'home', label: 'Home' },
                { id: 'about', label: 'About' },
                { id: 'skills', label: 'Skills' },
                { id: 'experience', label: 'Experience' },
                { id: 'projects', label: 'Projects' },
                { id: 'contact', label: 'Contact' }
            ];

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'glass-strong py-2 md:py-3' : 'py-3 md:py-5 bg-transparent'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
                        <div className="text-xl md:text-2xl font-black gradient-text cursor-pointer" onClick={() => scrollTo('home')}>
                            UP.
                        </div>

                        <div className="hidden md:flex items-center gap-6 lg:gap-8">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => scrollTo(item.id)} className={`nav-link ${activeSection === item.id ? 'active' : ''}`}>
                                    {item.label}
                                </button>
                            ))}
                            <button className="btn-primary text-sm py-2.5 px-5" onClick={() => scrollTo('contact')}>
                                Hire Me
                            </button>
                        </div>

                        <button className="md:hidden text-white p-2 -mr-2" onClick={() => setMobileOpen(!mobileOpen)} aria-label="Toggle menu">
                            <Icon name={mobileOpen ? "close" : "menu"} size={24} />
                        </button>
                    </div>

                    {mobileOpen && (
                        <div className="md:hidden glass-strong mt-2 mx-4 rounded-2xl p-3 mobile-menu">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => scrollTo(item.id)}
                                    className={`block w-full text-left py-3 px-4 rounded-xl text-sm font-medium transition-colors ${activeSection === item.id ? 'bg-white/10 text-white' : 'text-text-muted'}`}
                                >
                                    {item.label}
                                </button>
                            ))}
                            <button className="w-full btn-primary mt-2 py-3 text-sm" onClick={() => scrollTo('contact')}>
                                Hire Me
                            </button>
                        </div>
                    )}
                </nav>
            );
        };

        // Hero Section with Photo
        const Hero = () => {
            const [typedText, setTypedText] = useState('');
            const fullText = 'Senior Mobile Developer';
            useEffect(() => {
                let i = 0;
                const timer = setInterval(() => {
                    if (i <= fullText.length) { setTypedText(fullText.slice(0, i)); i++; }
                    else { clearInterval(timer); }
                }, 80);
                return () => clearInterval(timer);

                                            <Icon name="chevronRight" size={18} className={`text-text-muted shrink-0 transition-transform mt-1 ${activeProject === i ? 'rotate-90 text-indigo-400' : ''}`} />
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className={`glass rounded-2xl md:rounded-3xl p-6 md:p-8 relative overflow-hidden ${isVisible ? '' : 'opacity-0'}`} style={isVisible ? { animation: 'slideInRight 0.8s ease-out 0.4s forwards' } : {}}>
                                <div className={`absolute -top-16 -right-16 md:-top-20 md:-right-20 w-48 h-48 md:w-64 md:h-64 bg-gradient-to-br ${projects[activeProject].color} opacity-20 blur-3xl rounded-full`} />

                                <div className="relative z-10">
                                    <div className={`inline-flex items-center gap-2 px-3 py-1.5 md:px-4 md:py-2 rounded-full bg-gradient-to-r ${projects[activeProject].color} text-white text-xs md:text-sm font-medium mb-4 md:mb-6`}>
                                        <span className="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-white animate-pulse" />
                                        Featured Project
                                    </div>

                                    <h3 className="text-xl md:text-2xl font-bold text-white mb-1 md:mb-2">{projects[activeProject].title}</h3>
                                    <p className="text-sm md:text-base text-indigo-400 font-medium mb-3 md:mb-4">{projects[activeProject].subtitle}</p>
                                    <p className="text-xs md:text-sm text-text-muted mb-4 md:mb-6">{projects[activeProject].description}</p>

                                    <div className="space-y-2 md:space-y-3">
                                        <h4 className="text-xs md:text-sm font-semibold text-white uppercase tracking-wider">Key Features</h4>
                                        {projects[activeProject].features.map((feature, j) => (
                                            <div key={j} className="flex items-center gap-2 md:gap-3">
                                                <span className={`w-5 h-5 md:w-6 md:h-6 rounded-full bg-gradient-to-r ${projects[activeProject].color} flex items-center justify-center shrink-0`}>
                                                    <Icon name="check" size={12} className="text-white" />
                                                </span>
                                                <span className="text-xs md:text-sm text-text-muted">{feature}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // Contact Section with Web3Forms
        const Contact = () => {
            const [ref, isVisible] = useScrollAnimation();
            const [formData, setFormData] = useState({ name: '', email: '', message: '' });
            const [status, setStatus] = useState('idle');
            const [errorMsg, setErrorMsg] = useState('');
            const formRef = useRef(null);

            const WEB3FORMS_ACCESS_KEY = 'YOUR_ACCESS_KEY_HERE';
            const WEB3FORMS_ENDPOINT = 'https://api.web3forms.com/submit';

            const handleSubmit = async (e) => {
                e.preventDefault();

                if (!formData.name.trim() || !formData.email.trim() || !formData.message.trim()) {
                    setStatus('error');
                    setErrorMsg('Please fill in all fields.');
                    setTimeout(() => setStatus('idle'), 3000);
                    return;
                }

                if (WEB3FORMS_ACCESS_KEY === 'YOUR_ACCESS_KEY_HERE') {
                    const subject = encodeURIComponent(`Job Opportunity - Contact from ${formData.name}`);
                    const body = encodeURIComponent(
                        `Hi Umesh,

` +
                        `Name: ${formData.name}
` +
                        `Email: ${formData.email}

` +
                        `Message:
${formData.message}

` +
                        `---
Sent via Portfolio Contact Form`
                    );
                    window.location.href = `mailto:upawar7038@gmail.com?subject=${subject}&body=${body}`;
                    setStatus('success');
                    setFormData({ name: '', email: '', message: '' });
                    setTimeout(() => setStatus('idle'), 4000);
                    return;
                }

                setStatus('loading');

                try {
                    const response = await fetch(WEB3FORMS_ENDPOINT, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            access_key: WEB3FORMS_ACCESS_KEY,
                            name: formData.name,
                            email: formData.email,
                            message: formData.message,
                            subject: `New Contact Form Message from ${formData.name}`,
                            from_name: 'Portfolio Contact Form',
                            botcheck: false
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        setStatus('success');
                        setFormData({ name: '', email: '', message: '' });
                    } else {
                        setStatus('error');
                        setErrorMsg(data.message || 'Something went wrong. Please try again.');
                    }
                } catch (err) {
                    setStatus('error');
                    setErrorMsg('Network error. Please check your connection and try again.');
                }

                setTimeout(() => setStatus('idle'), 4000);
            };

            const contactInfo = [
                { icon: 'mail', label: 'Email', value: 'upawar7038@gmail.com', href: 'mailto:upawar7038@gmail.com' },
                { icon: 'phone', label: 'Phone', value: '+91-7038701068', href: 'tel:+917038701068' },
                { icon: 'mapPin', label: 'Location', value: 'Pune, MH 411021', href: '#' },
            ];

            return (
                <section id="contact" className="py-16 md:py-24 relative" ref={ref}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className={`text-center mb-10 md:mb-16 ${isVisible ? '' : 'opacity-0'}`} style={isVisible ? { animation: 'slideUp 0.8s ease-out forwards' } : {}}>
                            <span className="text-indigo-400 text-xs md:text-sm font-semibold tracking-wider uppercase">Get In Touch</span>
                            <h2 className="text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-bold mt-2">Let's Build Something <span className="gradient-text">Amazing</span></h2>
                        </div>

                        <div className={`grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12 max-w-5xl mx-auto ${isVisible ? '' : 'opacity-0'}`} style={isVisible ? { animation: 'slideUp 0.8s ease-out 0.2s forwards' } : {}}>
                            <div className="space-y-4 md:space-y-6">
                                <p className="text-text-muted text-sm md:text-base mb-4 md:mb-8">
                                    I'm currently open for new opportunities in Android and React Native development. 
                                    Whether you have a question or just want to say hi, I'll try my best to get back to you!
                                </p>

                                {contactInfo.map((info, i) => (
                                    <a key={i} href={info.href} className="glass rounded-xl md:rounded-2xl p-4 md:p-5 flex items-center gap-3 md:gap-4 card-hover group">
                                        <div className="w-10 h-10 md:w-12 md:h-12 rounded-lg md:rounded-xl bg-gradient-to-br from-indigo-500/20 to-purple-500/20 flex items-center justify-center group-hover:scale-110 transition-transform shrink-0">
                                            <Icon name={info.icon} size={18} className="text-indigo-400" />
                                        </div>
                                        <div className="min-w-0">
                                            <p className="text-xs text-text-muted uppercase tracking-wider">{info.label}</p>
                                            <p className="text-white font-medium text-sm md:text-base truncate">{info.value}</p>
                                        </div>
                                    </a>
                                ))}

                                <div className="glass rounded-xl md:rounded-2xl p-4 md:p-6 mt-4 md:mt-8">
                                    <h4 className="font-semibold text-white mb-3 md:mb-4 text-sm md:text-base">Connect on</h4>
                                    <div className="flex flex-wrap gap-2 md:gap-3">
                                        <a href="https://github.com/upawar7038" target="_blank" rel="noopener noreferrer" className="social-btn">
                                            <Icon name="github" size={16} />
                                            GitHub
                                        </a>
                                        <a href="https://www.linkedin.com/in/umesh-pawar-android" target="_blank" rel="noopener noreferrer" className="social-btn">
                                            <Icon name="linkedin" size={16} />
                                            LinkedIn
                                        </a>
                                        <a href="mailto:upawar7038@gmail.com" className="social-btn">
                                            <Icon name="mail" size={16} />
                                            Email
                                        </a>
                                    </div>
                                </div>
                            </div>

                            <div className="glass rounded-2xl md:rounded-3xl p-5 md:p-8">
                                {status === 'success' ? (
                                    <div className="h-full min-h-[300px] md:min-h-[400px] flex flex-col items-center justify-center text-center animate-scale">
                                        <div className="w-12 h-12 md:w-16 md:h-16 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center mb-3 md:mb-4">
                                            <Icon name="check" size={28} className="text-white" />
                                        </div>
                                        <h3 className="text-lg md:text-xl font-bold text-white mb-1 md:mb-2">Message Sent!</h3>
                                        <p className="text-xs md:text-sm text-text-muted">Thank you for reaching out. I'll get back to you soon.</p>
                                    </div>
                                ) : (
                                    <form ref={formRef} onSubmit={handleSubmit} className="space-y-4 md:space-y-6">
                                        {status === 'error' && (
                                            <div className="flex items-center gap-2 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs md:text-sm animate-shake">
                                                <Icon name="alertCircle" size={16} />
                                                {errorMsg}
                                            </div>
                                        )}

                                        <div>
                                            <label className="block text-xs md:text-sm font-medium text-text-muted mb-1.5 md:mb-2">Name</label>
                                            <input 
                                                type="text" 
                                                className="w-full px-3 py-2.5 md:px-4 md:py-3 rounded-lg md:rounded-xl bg-bg-elevated border border-white/10 text-white placeholder-text-dim focus:border-indigo-500 transition-colors text-sm md:text-base"
                                                placeholder="Your name"
                                                value={formData.name}
                                                onChange={e => setFormData({...formData, name: e.target.value})}
                                                disabled={status === 'loading'}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs md:text-sm font-medium text-text-muted mb-1.5 md:mb-2">Email</label>
                                            <input 
                                                type="email" 
                                                className="w-full px-3 py-2.5 md:px-4 md:py-3 rounded-lg md:rounded-xl bg-bg-elevated border border-white/10 text-white placeholder-text-dim focus:border-indigo-500 transition-colors text-sm md:text-base"
                                                placeholder="your@email.com"
                                                value={formData.email}
                                                onChange={e => setFormData({...formData, email: e.target.value})}
                                                disabled={status === 'loading'}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs md:text-sm font-medium text-text-muted mb-1.5 md:mb-2">Message</label>
                                            <textarea 
                                                rows={4}
                                                className="w-full px-3 py-2.5 md:px-4 md:py-3 rounded-lg md:rounded-xl bg-bg-elevated border border-white/10 text-white placeholder-text-dim focus:border-indigo-500 transition-colors resize-none text-sm md:text-base"
                                                placeholder="Tell me about your project..."
                                                value={formData.message}
                                                onChange={e => setFormData({...formData, message: e.target.value})}
                                                disabled={status === 'loading'}
                                            />
                                        </div>
                                        <button 
                                            type="submit" 
                                            className="w-full btn-primary py-3 md:py-4 text-sm md:text-base"
                                            disabled={status === 'loading'}
                                        >
                                            {status === 'loading' ? (
                                                <>
                                                    <span className="spinner" />
                                                    Sending...
                                                </>
                                            ) : (
                                                <>
                                                    <Icon name="send" size={18} />
                                                    Send Message
                                                </>
                                            )}
                                        </button>

                                        {WEB3FORMS_ACCESS_KEY === 'YOUR_ACCESS_KEY_HERE' && (
                                            <p className="text-xs text-text-dim text-center mt-2">
                                                Note: Using mailto fallback. For automatic delivery, add your Web3Forms access key in the code.
                                            </p>
                                        )}
                                    </form>
                                )}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // Footer
        const Footer = () => (
            <footer className="py-6 md:py-8 border-t border-white/10">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-3 md:gap-4">
                    <div className="text-xl md:text-2xl font-black gradient-text">UP.</div>
                    <p className="text-xs md:text-sm text-text-muted">© 2026 Umesh Pawar. All rights reserved.</p>
                    <div className="flex gap-4 md:gap-6 text-xs md:text-sm text-text-muted">
                        <button onClick={() => document.getElementById('home')?.scrollIntoView({ behavior: 'smooth' })} className="hover:text-white transition-colors">Home</button>
                        <button onClick={() => document.getElementById('projects')?.scrollIntoView({ behavior: 'smooth' })} className="hover:text-white transition-colors">Projects</button>
                        <button onClick={() => document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' })} className="hover:text-white transition-colors">Contact</button>
                    </div>
                </div>
            </footer>
        );

        // Main App
        const App = () => (
            <div className="relative">
                <ParticleBackground />
                <Navigation />
                <main className="relative z-10">
                    <Hero />
                    <About />
                    <Skills />
                    <Experience />
                    <Projects />
                    <Contact />
                </main>
                <Footer />
            </div>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
